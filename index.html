<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ音乐 • 音乐库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .song-row:hover { background-color: #27272a; }
        .lyrics-line { 
            transition: all 0.2s ease; 
            padding: 6px 12px;
            border-radius: 8px;
        }
        .lyrics-line.active { 
            color: #ff2d55; 
            font-weight: 700; 
            background-color: rgba(255, 45, 85, 0.1);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-[#0f0f11] text-white">
    <div class="flex h-screen">
        
        <!-- 左侧导航 -->
        <div class="w-60 bg-[#18181b] border-r border-zinc-800 flex flex-col">
            <div class="p-6 flex items-center gap-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-purple-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-brands fa-qq text-3xl"></i>
                </div>
                <span class="font-bold text-3xl">QQ音乐</span>
            </div>

            <div class="px-3 mt-4">
                <div onclick="showAllSongs()" class="px-4 py-3 rounded-2xl flex items-center gap-x-3 cursor-pointer bg-[#27272a]">
                    <i class="fa-solid fa-compass w-5"></i><span>发现音乐</span>
                </div>
                <div onclick="showFavorites()" class="px-4 py-3 rounded-2xl flex items-center gap-x-3 cursor-pointer mt-1">
                    <i class="fa-solid fa-heart w-5 text-red-400"></i><span>我喜欢</span>
                </div>
            </div>

            <div class="mt-auto p-4 border-t border-zinc-800">
                <button onclick="addYouTubeSong()" class="w-full flex items-center justify-center gap-x-2 bg-red-600 hover:bg-red-700 py-3 rounded-2xl text-sm font-semibold">
                    <i class="fa-brands fa-youtube"></i><span>添加 YouTube 歌曲</span>
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 border-b border-zinc-800 flex items-center px-8 bg-[#18181b]">
                <div class="flex-1 max-w-2xl relative">
                    <i class="fa-solid fa-search absolute left-5 top-4 text-zinc-400"></i>
                    <input id="search-input" type="text" placeholder="搜索歌曲（如：周杰伦 晴天）" 
                           class="w-full bg-zinc-800 border border-zinc-700 pl-12 py-3 rounded-3xl text-sm" 
                           onkeyup="if (event.key === 'Enter') searchSongs()">
                </div>
                <button onclick="searchSongs()" class="ml-4 px-6 py-3 bg-red-600 hover:bg-red-700 rounded-2xl text-sm font-medium">搜索</button>
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h1 id="page-title" class="text-4xl font-bold">发现音乐</h1>
                        <p class="text-zinc-400 mt-1">共 <span id="song-count">0</span> 首</p>
                    </div>
                </div>

                <div class="bg-[#18181b] rounded-3xl overflow-hidden">
                    <div class="grid grid-cols-12 px-6 py-3 text-sm text-zinc-400 border-b border-zinc-700">
                        <div class="col-span-7">歌曲</div>
                        <div class="col-span-3">歌手</div>
                        <div class="col-span-2 text-right">操作</div>
                    </div>
                    <div id="song-list" class="divide-y divide-zinc-800"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部播放器 -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#18181b] border-t border-zinc-700 h-20 px-6 flex items-center z-50">
        <div class="flex items-center gap-x-4 w-1/3">
            <img id="player-cover" src="https://picsum.photos/id/1015/56/56" class="w-14 h-14 rounded-2xl object-cover">
            <div>
                <div id="player-title" class="font-semibold text-sm">未播放</div>
                <div id="player-artist" class="text-xs text-zinc-400">选择歌曲</div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center max-w-[520px]">
            <div class="flex items-center gap-x-5">
                <button onclick="prevSong()" class="text-zinc-300 hover:text-white"><i class="fa-solid fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-play ml-0.5 text-xl" id="play-icon"></i>
                </button>
                <button onclick="nextSong()" class="text-zinc-300 hover:text-white"><i class="fa-solid fa-step-forward text-xl"></i></button>
                
                <button onclick="showLyrics()" class="ml-4 px-4 py-1.5 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-xs font-medium flex items-center gap-x-1">
                    <i class="fa-solid fa-align-left"></i><span>歌词</span>
                </button>
            </div>
            
            <div class="flex items-center gap-x-3 w-full mt-1 px-4">
                <span id="current-time" class="text-xs text-zinc-400 w-10 text-right">0:00</span>
                <div onclick="seekTo(event)" class="flex-1 h-1 bg-zinc-700 rounded cursor-pointer">
                    <div id="progress-bar" class="h-1 bg-red-500 rounded w-0"></div>
                </div>
                <span id="total-time" class="text-xs text-zinc-400 w-10">0:00</span>
            </div>
        </div>
    </div>

    <!-- 歌词弹窗 -->
    <div id="lyrics-modal" onclick="hideLyrics()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-[#18181b] w-full max-w-lg rounded-3xl p-8 max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <div id="lyrics-title" class="font-bold text-xl"></div>
                    <div id="lyrics-artist" class="text-sm text-zinc-400"></div>
                </div>
                <button onclick="hideLyrics()" class="text-2xl text-zinc-400 hover:text-white">×</button>
            </div>
            
            <div id="lyrics-content" class="flex-1 overflow-auto text-center text-lg leading-relaxed py-4 space-y-1">
                <!-- 动态歌词 -->
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let songs = [];
        let favorites = [];
        let currentSong = null;
        let isPlaying = false;
        let player;
        let lyricsInterval = null;

        // 带时间戳的歌词（LRC格式简化版）
        const defaultSongs = [
            { 
                id: 1, title: "晴天", artist: "周杰伦", videoId: "4iQ2v9d7m8k", cover: "https://picsum.photos/id/1015/300/300",
                lyrics: [
                    { time: 12, text: "故事的小黄花" },
                    { time: 15, text: "从出生那年就飘着" },
                    { time: 19, text: "童年的荡秋千" },
                    { time: 23, text: "随记忆一直晃到现在" },
                    { time: 28, text: "Re So So Si Do Si La" },
                    { time: 32, text: "吹着前奏望着远方" },
                    { time: 36, text: "我想起那天" },
                    { time: 39, text: "晚风吹乱头发" }
                ]
            },
            { 
                id: 2, title: "夜曲", artist: "周杰伦", videoId: "3JZ_D3ELw0k", cover: "https://picsum.photos/id/102/300/300",
                lyrics: [
                    { time: 8, text: "为你封印了双眼" },
                    { time: 12, text: "在我的世界里" },
                    { time: 16, text: "只剩下你的脸" },
                    { time: 21, text: "夜曲" },
                    { time: 25, text: "在黑夜里" },
                    { time: 28, text: "我们像两只蝴蝶" },
                    { time: 32, text: "在花丛中飞舞" }
                ]
            },
            { 
                id: 3, title: "江南", artist: "林俊杰", videoId: "9bZkp7q19f0", cover: "https://picsum.photos/id/1033/300/300",
                lyrics: [
                    { time: 5, text: "风到这里就是粘" },
                    { time: 9, text: "粘住过客的思念" },
                    { time: 14, text: "雨到了这里就是泪" },
                    { time: 18, text: "泪在心底的河面" }
                ]
            },
            { 
                id: 4, title: "告白气球", artist: "周杰伦", videoId: "dQw4w9wgxcQ", cover: "https://picsum.photos/id/1040/300/300",
                lyrics: [
                    { time: 10, text: "塞纳河畔 左岸的咖啡" },
                    { time: 14, text: "我手一杯 品尝你的美" },
                    { time: 18, text: "留下唇印的嘴" }
                ]
            },
            { 
                id: 5, title: "演员", artist: "薛之谦", videoId: "kXYiU_JCYtU", cover: "https://picsum.photos/id/106/300/300",
                lyrics: [
                    { time: 7, text: "简单点 说话的方式简单点" },
                    { time: 12, text: "递进的情绪请省略" },
                    { time: 16, text: "你又不是个演员" }
                ]
            }
        ];

        function init() {
            songs = JSON.parse(localStorage.getItem('qqmusic_songs')) || [...defaultSongs];
            favorites = JSON.parse(localStorage.getItem('qqmusic_favorites')) || [];
            renderSongList();
            updateSongCount();
            initYouTubePlayer();
        }

        function saveData() {
            localStorage.setItem('qqmusic_songs', JSON.stringify(songs));
            localStorage.setItem('qqmusic_favorites', JSON.stringify(favorites));
        }

        function updateSongCount() {
            document.getElementById('song-count').innerText = songs.length;
        }

        function renderSongList(filtered = null) {
            const container = document.getElementById('song-list');
            container.innerHTML = '';
            let toShow = filtered || songs;

            toShow.forEach(song => {
                const isFav = favorites.includes(song.id);
                const row = document.createElement('div');
                row.className = `song-row grid grid-cols-12 px-6 py-3 items-center cursor-pointer text-sm`;
                row.innerHTML = `
                    <div class="col-span-7 flex items-center gap-x-3">
                        <img src="${song.cover}" class="w-10 h-10 rounded-xl object-cover">
                        <div><div class="font-medium">${song.title}</div><div class="text-xs text-zinc-400">${song.artist}</div></div>
                    </div>
                    <div class="col-span-3 text-zinc-400">${song.artist}</div>
                    <div class="col-span-2 flex justify-end items-center gap-x-3">
                        <button onclick="event.stopImmediatePropagation(); toggleFavorite(${song.id}, this)" class="text-lg">
                            <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart text-red-400"></i>
                        </button>
                        <button onclick="event.stopImmediatePropagation(); playSong(${song.id})" class="px-5 py-1.5 bg-red-600 hover:bg-red-700 rounded-2xl text-xs font-medium">播放</button>
                    </div>
                `;
                row.onclick = () => playSong(song.id);
                container.appendChild(row);
            });
        }

        function toggleFavorite(id, el) {
            event.stopImmediatePropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(i => i !== id);
                el.innerHTML = `<i class="fa-regular fa-heart text-red-400"></i>`;
            } else {
                favorites.push(id);
                el.innerHTML = `<i class="fa-solid fa-heart text-red-400"></i>`;
            }
            saveData();
        }

        function playSong(songId) {
            const song = songs.find(s => s.id === songId);
            if (!song) return;
            currentSong = song;

            document.getElementById('player-title').innerText = song.title;
            document.getElementById('player-artist').innerText = song.artist;
            document.getElementById('player-cover').src = song.cover;

            if (player && player.loadVideoById) {
                player.loadVideoById(song.videoId);
                player.playVideo();
            }
            isPlaying = true;
            document.getElementById('play-icon').classList.remove('fa-play');
            document.getElementById('play-icon').classList.add('fa-pause');

            // 如果歌词弹窗已打开，立即更新
            if (!document.getElementById('lyrics-modal').classList.contains('hidden')) {
                showLyrics();
            }
        }

        function togglePlay() {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
                isPlaying = false;
                document.getElementById('play-icon').classList.add('fa-play');
                document.getElementById('play-icon').classList.remove('fa-pause');
            } else {
                player.playVideo();
                isPlaying = true;
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }
        }

        function nextSong() {
            if (!currentSong) return;
            let idx = songs.findIndex(s => s.id === currentSong.id);
            playSong(songs[(idx + 1) % songs.length].id);
        }

        function prevSong() {
            if (!currentSong) return;
            let idx = songs.findIndex(s => s.id === currentSong.id);
            playSong(songs[(idx - 1 + songs.length) % songs.length].id);
        }

        function showLyrics() {
            if (!currentSong) {
                alert("请先播放一首歌曲！");
                return;
            }

            const modal = document.getElementById('lyrics-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            document.getElementById('lyrics-title').innerText = currentSong.title;
            document.getElementById('lyrics-artist').innerText = currentSong.artist;

            const content = document.getElementById('lyrics-content');
            content.innerHTML = '';

            if (!currentSong.lyrics || currentSong.lyrics.length === 0) {
                content.innerHTML = `<div class="text-zinc-400 py-12">暂无歌词<br><span class="text-xs">可以手动添加</span></div>`;
                return;
            }

            currentSong.lyrics.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = `lyrics-line text-lg py-1`;
                div.dataset.time = line.time;
                div.innerText = line.text;
                content.appendChild(div);
            });

            // 启动同步
            startLyricsSync();
        }

        function hideLyrics() {
            document.getElementById('lyrics-modal').classList.remove('flex');
            document.getElementById('lyrics-modal').classList.add('hidden');
            stopLyricsSync();
        }

        let lyricsTimer = null;

        function startLyricsSync() {
            stopLyricsSync(); // 先清除旧的

            lyricsTimer = setInterval(() => {
                if (!currentSong || !player || !player.getCurrentTime) return;

                const currentTime = player.getCurrentTime();
                const lines = document.querySelectorAll('#lyrics-content .lyrics-line');
                let activeIndex = -1;

                lines.forEach((line, index) => {
                    line.classList.remove('active');
                    const lineTime = parseFloat(line.dataset.time);
                    if (currentTime >= lineTime) {
                        activeIndex = index;
                    }
                });

                if (activeIndex >= 0) {
                    lines[activeIndex].classList.add('active');
                    // 自动滚动到当前行
                    lines[activeIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 300);
        }

        function stopLyricsSync() {
            if (lyricsTimer) {
                clearInterval(lyricsTimer);
                lyricsTimer = null;
            }
        }

        function searchSongs() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (!keyword) {
                renderSongList();
                return;
            }
            const filtered = songs.filter(s => s.title.toLowerCase().includes(keyword) || s.artist.toLowerCase().includes(keyword));
            renderSongList(filtered);
        }

        function addYouTubeSong() {
            const url = prompt("请输入 YouTube 链接或视频ID：");
            if (!url) return;

            let videoId = url;
            if (url.includes('youtube.com')) videoId = url.match(/[?&]v=([^&]+)/)[1];
            else if (url.includes('youtu.be')) videoId = url.split('/').pop();

            const title = prompt("歌曲名称：", "新歌曲");
            const artist = prompt("歌手：", "未知");

            const newSong = {
                id: Date.now(),
                title, artist,
                videoId,
                cover: `https://picsum.photos/id/${Math.floor(Math.random()*200)}/300/300`,
                lyrics: []
            };

            songs.push(newSong);
            saveData();
            renderSongList();
            updateSongCount();
            setTimeout(() => playSong(newSong.id), 300);
        }

        function initYouTubePlayer() {}

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 0 },
                events: {
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) nextSong();
                    }
                }
            });
        }

        function showAllSongs() {
            document.getElementById('page-title').innerText = '发现音乐';
            renderSongList();
        }

        function showFavorites() {
            document.getElementById('page-title').innerText = '我喜欢';
            renderSongList(songs.filter(s => favorites.includes(s.id)));
        }

        window.onload = init;
    </script>
</body>
</html>
