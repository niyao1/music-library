<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ音乐 • 音乐库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .qq-red { color: #ff2d55; }
        .song-row:hover { background-color: #27272a; }
    </style>
</head>
<body class="bg-[#0f0f11] text-white">
    <div class="flex h-screen">
        
        <!-- 左侧导航 -->
        <div class="w-60 bg-[#18181b] border-r border-zinc-800 flex flex-col">
            <div class="p-6 flex items-center gap-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-purple-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-brands fa-qq text-3xl"></i>
                </div>
                <span class="font-bold text-3xl">QQ音乐</span>
            </div>

            <div class="px-3 mt-4">
                <div onclick="showAllSongs()" class="qq-nav px-4 py-3 rounded-2xl flex items-center gap-x-3 cursor-pointer bg-[#27272a]">
                    <i class="fa-solid fa-compass w-5"></i>
                    <span>发现音乐</span>
                </div>
                <div onclick="showFavorites()" class="qq-nav px-4 py-3 rounded-2xl flex items-center gap-x-3 cursor-pointer mt-1">
                    <i class="fa-solid fa-heart w-5 text-red-400"></i>
                    <span>我喜欢</span>
                </div>
                <div onclick="showLocalSongs()" class="qq-nav px-4 py-3 rounded-2xl flex items-center gap-x-3 cursor-pointer mt-1">
                    <i class="fa-solid fa-folder w-5 text-emerald-400"></i>
                    <span>本地音乐</span>
                </div>
            </div>

            <div class="mt-auto p-4 border-t border-zinc-800">
                <button onclick="addYouTubeSong()" 
                        class="w-full flex items-center justify-center gap-x-2 bg-red-600 hover:bg-red-700 py-3 rounded-2xl text-sm font-semibold">
                    <i class="fa-brands fa-youtube"></i>
                    <span>添加 YouTube 歌曲</span>
                </button>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="flex-1 flex flex-col">
            
            <!-- 顶部搜索 -->
            <div class="h-16 border-b border-zinc-800 flex items-center px-8 bg-[#18181b]">
                <div class="flex-1 max-w-2xl relative">
                    <i class="fa-solid fa-search absolute left-5 top-4 text-zinc-400"></i>
                    <input id="search-input" type="text" placeholder="搜索歌曲、歌手（如：周杰伦 晴天）" 
                           class="w-full bg-zinc-800 border border-zinc-700 pl-12 py-3 rounded-3xl text-sm" 
                           onkeyup="if (event.key === 'Enter') searchYouTube()">
                </div>
                <button onclick="searchYouTube()" 
                        class="ml-4 px-6 py-3 bg-red-600 hover:bg-red-700 rounded-2xl text-sm font-medium">
                    搜索 YouTube
                </button>
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h1 id="page-title" class="text-4xl font-bold">发现音乐</h1>
                        <p class="text-zinc-400 mt-1">共 <span id="song-count">0</span> 首</p>
                    </div>
                </div>

                <!-- 歌曲列表 -->
                <div class="bg-[#18181b] rounded-3xl overflow-hidden">
                    <div class="grid grid-cols-12 px-6 py-3 text-sm text-zinc-400 border-b border-zinc-700">
                        <div class="col-span-7">歌曲</div>
                        <div class="col-span-3">歌手</div>
                        <div class="col-span-2 text-right">操作</div>
                    </div>
                    <div id="song-list" class="divide-y divide-zinc-800 max-h-[calc(100vh-280px)] overflow-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部播放器 -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#18181b] border-t border-zinc-700 h-20 px-6 flex items-center z-50">
        <div class="flex items-center gap-x-4 w-1/3">
            <img id="player-cover" src="https://picsum.photos/id/1015/56/56" class="w-14 h-14 rounded-2xl object-cover">
            <div>
                <div id="player-title" class="font-semibold text-sm">未播放</div>
                <div id="player-artist" class="text-xs text-zinc-400">选择歌曲</div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center max-w-[520px]">
            <div class="flex items-center gap-x-5">
                <button onclick="prevSong()" class="text-zinc-300 hover:text-white"><i class="fa-solid fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-play ml-0.5 text-xl" id="play-icon"></i>
                </button>
                <button onclick="nextSong()" class="text-zinc-300 hover:text-white"><i class="fa-solid fa-step-forward text-xl"></i></button>
            </div>
            
            <div class="flex items-center gap-x-3 w-full mt-1 px-4">
                <span id="current-time" class="text-xs text-zinc-400 w-10 text-right">0:00</span>
                <div onclick="seekTo(event)" class="flex-1 h-1 bg-zinc-700 rounded cursor-pointer">
                    <div id="progress-bar" class="h-1 bg-red-500 rounded w-0"></div>
                </div>
                <span id="total-time" class="text-xs text-zinc-400 w-10">0:00</span>
            </div>
        </div>

        <div class="w-1/3 flex justify-end">
            <div id="youtube-player" class="hidden"></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let songs = [];
        let favorites = [];
        let currentSong = null;
        let isPlaying = false;
        let player;
        let currentView = 'all';

        // 预置一些热门歌曲（YouTube Video ID）
        const defaultSongs = [
            { id: 1, title: "晴天", artist: "周杰伦", videoId: "4iQ2v9d7m8k", cover: "https://picsum.photos/id/1015/300/300" },
            { id: 2, title: "夜曲", artist: "周杰伦", videoId: "3JZ_D3ELw0k", cover: "https://picsum.photos/id/102/300/300" },
            { id: 3, title: "江南", artist: "林俊杰", videoId: "9bZkp7q19f0", cover: "https://picsum.photos/id/1033/300/300" },
            { id: 4, title: "告白气球", artist: "周杰伦", videoId: "dQw4w9wgxcQ", cover: "https://picsum.photos/id/1040/300/300" },
            { id: 5, title: "七里香", artist: "周杰伦", videoId: "kXYiU_JCYtU", cover: "https://picsum.photos/id/106/300/300" },
            { id: 6, title: "稻香", artist: "周杰伦", videoId: "9bZkp7q19f0", cover: "https://picsum.photos/id/1074/300/300" },
            { id: 7, title: "演员", artist: "薛之谦", videoId: "3JZ_D3ELw0k", cover: "https://picsum.photos/id/1080/300/300" },
            { id: 8, title: "体面", artist: "于文文", videoId: "kXYiU_JCYtU", cover: "https://picsum.photos/id/109/300/300" }
        ];

        function init() {
            songs = JSON.parse(localStorage.getItem('qqmusic_songs')) || [...defaultSongs];
            favorites = JSON.parse(localStorage.getItem('qqmusic_favorites')) || [];
            
            renderSongList();
            updateSongCount();
            initYouTubePlayer();
        }

        function saveData() {
            localStorage.setItem('qqmusic_songs', JSON.stringify(songs));
            localStorage.setItem('qqmusic_favorites', JSON.stringify(favorites));
        }

        function updateSongCount() {
            document.getElementById('song-count').innerText = songs.length;
        }

        function renderSongList(filtered = null) {
            const container = document.getElementById('song-list');
            container.innerHTML = '';
            
            let toShow = filtered || songs;
            if (currentView === 'favorites') toShow = songs.filter(s => favorites.includes(s.id));

            toShow.forEach(song => {
                const isFav = favorites.includes(song.id);
                const row = document.createElement('div');
                row.className = `song-row grid grid-cols-12 px-6 py-3 items-center cursor-pointer text-sm`;
                row.innerHTML = `
                    <div class="col-span-7 flex items-center gap-x-3">
                        <img src="${song.cover}" class="w-10 h-10 rounded-xl object-cover">
                        <div>
                            <div class="font-medium">${song.title}</div>
                            <div class="text-xs text-zinc-400">${song.artist}</div>
                        </div>
                    </div>
                    <div class="col-span-3 text-zinc-400">${song.artist}</div>
                    <div class="col-span-2 flex justify-end items-center gap-x-3">
                        <button onclick="event.stopImmediatePropagation(); toggleFavorite(${song.id}, this)" class="text-lg">
                            <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart text-red-400"></i>
                        </button>
                        <button onclick="event.stopImmediatePropagation(); playSong(${song.id})" 
                                class="px-5 py-1.5 bg-red-600 hover:bg-red-700 rounded-2xl text-xs font-medium">
                            播放
                        </button>
                    </div>
                `;
                row.onclick = () => playSong(song.id);
                container.appendChild(row);
            });
        }

        function toggleFavorite(id, el) {
            event.stopImmediatePropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(i => i !== id);
                el.innerHTML = `<i class="fa-regular fa-heart text-red-400"></i>`;
            } else {
                favorites.push(id);
                el.innerHTML = `<i class="fa-solid fa-heart text-red-400"></i>`;
            }
            saveData();
        }

        function playSong(songId) {
            const song = songs.find(s => s.id === songId);
            if (!song) return;
            
            currentSong = song;
            document.getElementById('player-title').innerText = song.title;
            document.getElementById('player-artist').innerText = song.artist;
            document.getElementById('player-cover').src = song.cover;

            // 播放 YouTube 视频
            if (player && player.loadVideoById) {
                player.loadVideoById(song.videoId);
                player.playVideo();
            }
            isPlaying = true;
            document.getElementById('play-icon').classList.remove('fa-play');
            document.getElementById('play-icon').classList.add('fa-pause');
        }

        function togglePlay() {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
                isPlaying = false;
                document.getElementById('play-icon').classList.add('fa-play');
                document.getElementById('play-icon').classList.remove('fa-pause');
            } else {
                player.playVideo();
                isPlaying = true;
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }
        }

        function nextSong() {
            if (!currentSong) return;
            let idx = songs.findIndex(s => s.id === currentSong.id);
            let next = (idx + 1) % songs.length;
            playSong(songs[next].id);
        }

        function prevSong() {
            if (!currentSong) return;
            let idx = songs.findIndex(s => s.id === currentSong.id);
            let prev = (idx - 1 + songs.length) % songs.length;
            playSong(songs[prev].id);
        }

        function searchYouTube() {
            const keyword = document.getElementById('search-input').value.trim();
            if (!keyword) return;

            // 简单搜索：先在已有歌曲里找
            const filtered = songs.filter(s => 
                s.title.includes(keyword) || s.artist.includes(keyword)
            );

            if (filtered.length > 0) {
                renderSongList(filtered);
            } else {
                alert(`未在本地找到“${keyword}”，\n你可以点击下方“添加 YouTube 歌曲”手动添加！`);
            }
        }

        function addYouTubeSong() {
            const url = prompt("请输入 YouTube 视频链接或视频ID：\n例如：https://www.youtube.com/watch?v=3JZ_D3ELw0k");
            if (!url) return;

            // 提取 videoId
            let videoId = url;
            if (url.includes('youtube.com')) {
                const match = url.match(/[?&]v=([^&]+)/);
                if (match) videoId = match[1];
            } else if (url.includes('youtu.be')) {
                videoId = url.split('/').pop();
            }

            const title = prompt("请输入歌曲名称：", "未知歌曲");
            const artist = prompt("请输入歌手：", "未知歌手");

            const newSong = {
                id: Date.now(),
                title: title,
                artist: artist,
                videoId: videoId,
                cover: `https://picsum.photos/id/${Math.floor(Math.random()*200)}/300/300`
            };

            songs.push(newSong);
            saveData();
            renderSongList();
            updateSongCount();
            
            setTimeout(() => {
                playSong(newSong.id);
            }, 300);
        }

        function initYouTubePlayer() {
            // YouTube IFrame API 加载后会自动调用 onYouTubeIframeAPIReady
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: {
                    'onReady': () => console.log('YouTube Player Ready'),
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.ENDED) {
                            nextSong();
                        }
                    }
                }
            });
        }

        function showAllSongs() {
            currentView = 'all';
            document.getElementById('page-title').innerText = '发现音乐';
            renderSongList();
        }

        function showFavorites() {
            currentView = 'favorites';
            document.getElementById('page-title').innerText = '我喜欢';
            renderSongList();
        }

        function showLocalSongs() {
            currentView = 'local';
            document.getElementById('page-title').innerText = '本地音乐';
            renderSongList(songs.filter(s => s.isLocal));
        }

        window.onload = init;
    </script>
</body>
</html>
