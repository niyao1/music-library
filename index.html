<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐库 • MusicLib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); }
        .music-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .music-card:hover { transform: translateY(-6px); }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="flex h-screen overflow-hidden">
        
        <!-- 左侧边栏 -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 flex items-center gap-x-3">
                <div class="w-11 h-11 bg-gradient-to-br from-purple-600 to-violet-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-music text-3xl"></i>
                </div>
                <span class="font-bold text-3xl tracking-tighter">音乐库</span>
            </div>

            <div class="px-3">
                <div onclick="showAllSongs()" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 cursor-pointer mb-1 nav-active" id="nav-all">
                    <i class="fa-solid fa-home w-5"></i>
                    <span class="font-medium">全部歌曲</span>
                </div>
                <div onclick="showFavorites()" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 cursor-pointer mb-1" id="nav-fav">
                    <i class="fa-solid fa-heart w-5 text-red-400"></i>
                    <span class="font-medium">我喜欢的</span>
                </div>
                
                <div class="px-3 mt-6">
                    <div class="flex items-center justify-between px-1 mb-2">
                        <span class="text-xs font-semibold text-zinc-400">播放列表</span>
                        <button onclick="createPlaylist()" class="text-purple-400 hover:text-purple-300"><i class="fa-solid fa-plus text-sm"></i></button>
                    </div>
                    <div id="playlists-list" class="space-y-1 text-sm"></div>
                </div>
            </div>

            <div class="mt-auto p-4 border-t border-zinc-800 space-y-3">
                <!-- 本地上传按钮 -->
                <button onclick="uploadLocalMP3()" 
                        class="w-full flex items-center justify-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl font-semibold text-sm">
                    <i class="fa-solid fa-upload"></i>
                    <span>上传本地 MP3</span>
                </button>
                
                <button onclick="showAddModal()" 
                        class="w-full flex items-center justify-center gap-x-2 bg-purple-600 hover:bg-purple-700 py-3 rounded-2xl font-semibold text-sm">
                    <i class="fa-solid fa-link"></i>
                    <span>添加网络链接</span>
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 border-b border-zinc-800 flex items-center px-8 bg-zinc-900/80">
                <div class="flex-1 max-w-xl">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-4 top-3.5 text-zinc-400"></i>
                        <input id="search-input" type="text" placeholder="搜索歌曲..." 
                               class="w-full bg-zinc-800 border border-zinc-700 pl-11 py-2.5 rounded-3xl text-sm" oninput="filterSongs()">
                    </div>
                </div>
                <div class="ml-auto flex items-center gap-x-2">
                    <div class="bg-zinc-800 px-3 py-1.5 rounded-2xl flex items-center gap-x-2">
                        <img src="https://picsum.photos/id/64/28/28" class="w-7 h-7 rounded-full">
                        <span class="font-medium text-sm">Karen</span>
                    </div>
                </div>
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <div class="flex items-end justify-between mb-6">
                    <div>
                        <h1 id="page-title" class="text-4xl font-bold tracking-tighter">全部歌曲</h1>
                        <p class="text-zinc-400 mt-1">共 <span id="song-count">0</span> 首</p>
                    </div>
                </div>
                <div id="song-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-8 gap-5"></div>
            </div>
        </div>
    </div>

    <!-- 底部播放器 -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-700 h-[82px] px-6 flex items-center z-50">
        <div class="flex items-center gap-x-4 w-1/3">
            <div onclick="showNowPlaying()" class="flex items-center gap-x-3 cursor-pointer">
                <img id="player-cover" src="https://picsum.photos/id/1015/56/56" class="w-14 h-14 rounded-2xl object-cover">
                <div>
                    <div id="player-title" class="font-semibold text-sm truncate">未播放</div>
                    <div id="player-artist" class="text-xs text-zinc-400 truncate">选择歌曲</div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center max-w-[460px]">
            <div class="flex items-center gap-x-4 mb-1">
                <button onclick="toggleShuffle()" id="shuffle-btn" class="text-zinc-400 hover:text-white w-8"><i class="fa-solid fa-random"></i></button>
                <button onclick="prevSong()" class="text-zinc-300 hover:text-white"><i class="fa-solid fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-11 h-11 bg-white text-black rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-play ml-0.5 text-lg" id="play-icon"></i>
                </button>
                <button onclick="nextSong()" class="text-zinc-300 hover:text-white"><i class="fa-solid fa-step-forward text-xl"></i></button>
                <button onclick="toggleRepeat()" id="repeat-btn" class="text-zinc-400 hover:text-white w-8"><i class="fa-solid fa-redo"></i></button>
            </div>
            
            <div class="flex items-center gap-x-3 w-full px-2">
                <span id="current-time" class="text-xs w-9 text-right text-zinc-400">0:00</span>
                <div onclick="seekTo(event)" class="flex-1 h-1.5 bg-zinc-700 rounded-full cursor-pointer">
                    <div id="progress-bar" class="h-1.5 bg-purple-500 rounded-full w-0"></div>
                </div>
                <span id="total-time" class="text-xs w-9 text-zinc-400">0:00</span>
            </div>
        </div>

        <div class="w-1/3 flex justify-end items-center gap-x-3">
            <i class="fa-solid fa-volume-down text-zinc-400"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="75" class="w-24 accent-purple-500" oninput="setVolume(this.value)">
        </div>
    </div>

    <!-- 添加网络链接弹窗 -->
    <div id="add-modal" onclick="if (event.target.id === 'add-modal') hideAddModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-md rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h3 class="text-2xl font-bold">添加网络歌曲</h3>
                <button onclick="hideAddModal()" class="text-2xl">×</button>
            </div>
            <form id="add-form" onsubmit="addNewSong(event)">
                <div class="space-y-4">
                    <input type="text" id="song-title" placeholder="歌曲标题" required class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl">
                    <input type="text" id="song-artist" placeholder="艺术家" required class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl">
                    <input type="url" id="song-url" placeholder="MP3 直链地址" required class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl">
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="hideAddModal()" class="flex-1 py-3 border border-zinc-700 rounded-2xl">取消</button>
                    <button type="submit" class="flex-1 py-3 bg-purple-600 rounded-2xl font-semibold">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let songs = [];
        let favorites = [];
        let playlists = [];
        let currentSong = null;
        let isPlaying = false;
        let audio = new Audio();
        let shuffleMode = false;
        let repeatMode = 0;
        let currentView = 'all';
        let currentPlaylistId = null;

        function init() {
            songs = JSON.parse(localStorage.getItem('musiclib_songs')) || [];
            favorites = JSON.parse(localStorage.getItem('musiclib_favorites')) || [];
            playlists = JSON.parse(localStorage.getItem('musiclib_playlists')) || [];

            if (songs.length === 0) {
                // 初始几首 demo
                songs = [
                    { id: 1, title: "星空回响", artist: "银河使者", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://picsum.photos/id/1015/300/300", isLocal: false },
                    { id: 2, title: "夜色迷航", artist: "月影乐队", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://picsum.photos/id/102/300/300", isLocal: false }
                ];
                saveData();
            }

            renderSongs();
            updateSongCount();
            renderPlaylists();
            initAudio();
            document.getElementById('volume-slider').value = 75;
            audio.volume = 0.75;
        }

        function saveData() {
            localStorage.setItem('musiclib_songs', JSON.stringify(songs));
            localStorage.setItem('musiclib_favorites', JSON.stringify(favorites));
            localStorage.setItem('musiclib_playlists', JSON.stringify(playlists));
        }

        function updateSongCount() {
            document.getElementById('song-count').innerText = songs.length;
        }

        function renderSongs(filtered = null) {
            const grid = document.getElementById('song-grid');
            grid.innerHTML = '';
            let toShow = filtered || songs;

            if (currentView === 'favorites') toShow = songs.filter(s => favorites.includes(s.id));
            if (currentView === 'playlist' && currentPlaylistId) {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                if (pl) toShow = songs.filter(s => pl.songIds.includes(s.id));
            }

            if (toShow.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center"><i class="fa-solid fa-music text-6xl text-zinc-700"></i><p class="mt-4 text-zinc-400">空空如也</p></div>`;
                return;
            }

            toShow.forEach(song => {
                const isFav = favorites.includes(song.id);
                const card = document.createElement('div');
                card.className = `music-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer group`;
                card.innerHTML = `
                    <div class="relative">
                        <img src="${song.cover}" class="w-full aspect-square object-cover">
                        <div class="absolute top-3 right-3">
                            <button onclick="event.stopImmediatePropagation(); toggleFavorite(${song.id}, this)" class="w-8 h-8 flex items-center justify-center bg-black/60 rounded-full">
                                <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart text-red-400"></i>
                            </button>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-b from-black/30 to-black/80 opacity-0 group-hover:opacity-100 flex items-end p-4">
                            <button onclick="event.stopImmediatePropagation(); playSong(${song.id})" class="ml-auto w-11 h-11 bg-purple-600 rounded-full flex items-center justify-center">
                                <i class="fa-solid fa-play ml-0.5"></i>
                            </button>
                        </div>
                        ${song.isLocal ? `<div class="absolute bottom-3 left-3 bg-emerald-600 text-[10px] px-2 py-0.5 rounded-full">本地</div>` : ''}
                    </div>
                    <div class="p-4">
                        <div class="font-semibold truncate">${song.title}</div>
                        <div class="text-sm text-zinc-400 truncate">${song.artist}</div>
                    </div>
                `;
                card.onclick = () => playSong(song.id);
                grid.appendChild(card);
            });
        }

        function filterSongs() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            renderSongs(songs.filter(s => s.title.toLowerCase().includes(keyword) || s.artist.toLowerCase().includes(keyword)));
        }

        // ==================== 本地上传 MP3 ====================
        function uploadLocalMP3() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'audio/mp3,audio/mpeg';
            input.multiple = true;

            input.onchange = function() {
                const files = Array.from(input.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const newSong = {
                            id: Date.now() + Math.random(),
                            title: file.name.replace('.mp3', ''),
                            artist: '本地音乐',
                            url: e.target.result,           // base64
                            cover: `https://picsum.photos/id/${Math.floor(Math.random()*1000)}/300/300`,
                            isLocal: true
                        };
                        songs.push(newSong);
                        saveData();
                        renderSongs();
                        updateSongCount();
                        
                        // 自动播放第一首
                        if (files.indexOf(file) === 0) {
                            setTimeout(() => playSong(newSong.id), 300);
                        }
                    };
                    reader.readAsDataURL(file);   // 转成 base64
                });
            };
            input.click();
        }

        // ==================== 播放逻辑（支持 base64） ====================
        function playSong(songId) {
            const song = songs.find(s => s.id === songId);
            if (!song) return;
            currentSong = song;
            audio.src = song.url;
            audio.play().then(() => {
                isPlaying = true;
                updatePlayerUI();
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }).catch(() => alert('播放失败'));
        }

        function updatePlayerUI() {
            if (!currentSong) return;
            document.getElementById('player-cover').src = currentSong.cover;
            document.getElementById('player-title').innerText = currentSong.title;
            document.getElementById('player-artist').innerText = currentSong.artist;
        }

        function togglePlay() {
            if (!currentSong) {
                if (songs.length > 0) playSong(songs[0].id);
                return;
            }
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('play-icon').classList.add('fa-play');
                document.getElementById('play-icon').classList.remove('fa-pause');
            } else {
                audio.play();
                isPlaying = true;
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }
        }

        function nextSong() {
            if (!currentSong) return;
            let idx = songs.findIndex(s => s.id === currentSong.id);
            let next = shuffleMode ? Math.floor(Math.random() * songs.length) : (idx + 1) % songs.length;
            playSong(songs[next].id);
        }

        function prevSong() {
            if (!currentSong) return;
            let idx = songs.findIndex(s => s.id === currentSong.id);
            let prev = (idx - 1 + songs.length) % songs.length;
            playSong(songs[prev].id);
        }

        function toggleShuffle() {
            shuffleMode = !shuffleMode;
            document.getElementById('shuffle-btn').classList.toggle('text-purple-400', shuffleMode);
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            const btn = document.getElementById('repeat-btn');
            btn.innerHTML = repeatMode === 0 ? '<i class="fa-solid fa-redo"></i>' : 
                            repeatMode === 1 ? '<i class="fa-solid fa-redo"></i>' : 
                            '<i class="fa-solid fa-redo text-purple-400"></i>';
        }

        function seekTo(e) {
            if (!currentSong || !audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function setVolume(val) {
            audio.volume = val / 100;
        }

        function initAudio() {
            audio.addEventListener('timeupdate', () => {
                if (!audio.duration) return;
                document.getElementById('progress-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-time').innerText = formatTime(audio.duration);
            });

            audio.addEventListener('ended', () => {
                if (repeatMode === 1) { audio.currentTime = 0; audio.play(); }
                else nextSong();
            });

            document.addEventListener('keydown', e => {
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
                if (e.code === 'ArrowRight') nextSong();
                if (e.code === 'ArrowLeft') prevSong();
            });
        }

        function formatTime(s) {
            if (!s) return '0:00';
            return Math.floor(s / 60) + ':' + Math.floor(s % 60).toString().padStart(2, '0');
        }

        function toggleFavorite(id, el) {
            event.stopImmediatePropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(i => i !== id);
                el.innerHTML = `<i class="fa-regular fa-heart text-red-400"></i>`;
            } else {
                favorites.push(id);
                el.innerHTML = `<i class="fa-solid fa-heart text-red-400"></i>`;
            }
            saveData();
        }

        function showFavorites() {
            currentView = 'favorites';
            document.getElementById('page-title').innerText = '我喜欢的';
            document.getElementById('nav-all').classList.remove('nav-active');
            document.getElementById('nav-fav').classList.add('nav-active');
            renderSongs();
        }

        function showAllSongs() {
            currentView = 'all';
            currentPlaylistId = null;
            document.getElementById('page-title').innerText = '全部歌曲';
            document.getElementById('nav-all').classList.add('nav-active');
            document.getElementById('nav-fav').classList.remove('nav-active');
            renderSongs();
        }

        function createPlaylist() {
            const name = prompt('播放列表名称：');
            if (!name) return;
            playlists.push({ id: Date.now(), name, songIds: [] });
            saveData();
            renderPlaylists();
        }

        function renderPlaylists() {
            const container = document.getElementById('playlists-list');
            container.innerHTML = '';
            playlists.forEach(pl => {
                const div = document.createElement('div');
                div.className = `px-3 py-2 rounded-xl hover:bg-zinc-800 cursor-pointer flex items-center text-sm ${currentPlaylistId === pl.id ? 'bg-zinc-800' : ''}`;
                div.innerHTML = `<i class="fa-solid fa-list text-purple-400 w-4 mr-2"></i><span class="flex-1 truncate">${pl.name}</span><span class="text-xs text-zinc-500">${pl.songIds.length}</span>`;
                div.onclick = () => loadPlaylist(pl.id);
                container.appendChild(div);
            });
        }

        function loadPlaylist(id) {
            currentView = 'playlist';
            currentPlaylistId = id;
            document.getElementById('page-title').innerText = playlists.find(p => p.id === id).name;
            renderSongs();
        }

        function showAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('add-modal').classList.add('flex');
        }

        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('flex');
            document.getElementById('add-modal').classList.add('hidden');
        }

        function addNewSong(e) {
            e.preventDefault();
            const newSong = {
                id: Date.now(),
                title: document.getElementById('song-title').value,
                artist: document.getElementById('song-artist').value,
                url: document.getElementById('song-url').value,
                cover: "https://picsum.photos/id/1015/300/300",
                isLocal: false
            };
            songs.push(newSong);
            saveData();
            renderSongs();
            updateSongCount();
            hideAddModal();
            setTimeout(() => playSong(newSong.id), 300);
        }

        function showNowPlaying() {
            if (currentSong) alert(`正在播放：${currentSong.title} - ${currentSong.artist}`);
        }

        window.onload = init;
    </script>
</body>
</html>
