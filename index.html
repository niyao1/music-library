<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐库 • MusicLib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); }
        .music-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .music-card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
        .nav-active { background-color: #27272a; color: white; }
        .player-bar { background: linear-gradient(to right, #18181b, #27272a); }
        .progress-container { height: 6px; }
        .progress-bar { transition: width 0.1s linear; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="flex h-screen overflow-hidden">
        
        <!-- 左侧边栏 -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <!-- Logo -->
            <div class="p-6 flex items-center gap-x-3">
                <div class="w-11 h-11 bg-gradient-to-br from-purple-600 to-violet-600 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-music text-3xl"></i>
                </div>
                <div>
                    <span class="font-bold text-3xl tracking-tighter">音乐库</span>
                </div>
            </div>

            <!-- 导航 -->
            <div class="px-3 mt-2">
                <div onclick="showAllSongs()" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 cursor-pointer mb-1 nav-active" id="nav-all">
                    <i class="fa-solid fa-home w-5"></i>
                    <span class="font-medium">全部歌曲</span>
                </div>
                <div onclick="showFavorites()" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 cursor-pointer mb-1" id="nav-fav">
                    <i class="fa-solid fa-heart w-5 text-red-400"></i>
                    <span class="font-medium">我喜欢的</span>
                </div>
                
                <!-- 播放列表 -->
                <div class="px-3 mt-6">
                    <div class="flex items-center justify-between px-1 mb-2">
                        <span class="text-xs font-semibold text-zinc-400">播放列表</span>
                        <button onclick="createPlaylist()" class="text-purple-400 hover:text-purple-300">
                            <i class="fa-solid fa-plus text-sm"></i>
                        </button>
                    </div>
                    <div id="playlists-list" class="space-y-1 text-sm"></div>
                </div>
            </div>

            <div class="mt-auto p-4 border-t border-zinc-800">
                <button onclick="showAddModal()" 
                        class="w-full flex items-center justify-center gap-x-2 bg-purple-600 hover:bg-purple-700 py-3 rounded-2xl font-semibold text-sm transition-all active:scale-[0.985]">
                    <i class="fa-solid fa-plus"></i>
                    <span>添加新歌</span>
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col">
            
            <!-- 顶部栏 -->
            <div class="h-16 border-b border-zinc-800 flex items-center px-8 bg-zinc-900/80 backdrop-blur-xl">
                <div class="flex-1 max-w-xl">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-4 top-3.5 text-zinc-400"></i>
                        <input id="search-input" type="text" placeholder="搜索歌曲或艺术家..." 
                               class="w-full bg-zinc-800 border border-zinc-700 pl-11 py-2.5 rounded-3xl text-sm focus:outline-none focus:border-purple-500"
                               oninput="filterSongs()">
                    </div>
                </div>
                <div class="flex items-center gap-x-3 ml-auto">
                    <div class="flex items-center gap-x-2 bg-zinc-800 px-3 py-1.5 rounded-2xl">
                        <img src="https://picsum.photos/id/64/28/28" class="w-7 h-7 rounded-full" alt="">
                        <span class="font-medium text-sm">Karen</span>
                    </div>
                </div>
            </div>

            <!-- 内容 -->
            <div class="flex-1 p-8 overflow-auto" id="main-content">
                <div class="flex items-end justify-between mb-6">
                    <div>
                        <h1 id="page-title" class="text-4xl font-bold tracking-tighter">全部歌曲</h1>
                        <p id="page-subtitle" class="text-zinc-400 mt-1">共 <span id="song-count">0</span> 首</p>
                    </div>
                </div>

                <!-- 歌曲网格 -->
                <div id="song-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-8 gap-5">
                    <!-- 动态渲染 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 底部播放器 -->
    <div class="fixed bottom-0 left-0 right-0 player-bar border-t border-zinc-700 h-[82px] px-6 flex items-center z-50">
        <div class="flex items-center gap-x-4 w-1/3">
            <div id="player-info" onclick="showNowPlaying()" class="flex items-center gap-x-3 cursor-pointer">
                <img id="player-cover" src="https://picsum.photos/id/1015/56/56" class="w-14 h-14 rounded-2xl object-cover shadow-xl ring-1 ring-white/10" alt="">
                <div class="min-w-0">
                    <div id="player-title" class="font-semibold text-sm truncate">未播放</div>
                    <div id="player-artist" class="text-xs text-zinc-400 truncate">选择一首歌曲</div>
                </div>
            </div>
        </div>

        <!-- 控制区 -->
        <div class="flex-1 flex flex-col items-center max-w-[460px]">
            <div class="flex items-center gap-x-4 mb-1">
                <!-- 控制按钮 -->
                <button onclick="toggleShuffle()" id="shuffle-btn" class="text-zinc-400 hover:text-white w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-random"></i>
                </button>
                <button onclick="prevSong()" class="text-zinc-300 hover:text-white">
                    <i class="fa-solid fa-step-backward text-xl"></i>
                </button>
                <button onclick="togglePlay()" id="play-btn"
                        class="w-11 h-11 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shadow-xl">
                    <i class="fa-solid fa-play ml-0.5 text-lg" id="play-icon"></i>
                </button>
                <button onclick="nextSong()" class="text-zinc-300 hover:text-white">
                    <i class="fa-solid fa-step-forward text-xl"></i>
                </button>
                <button onclick="toggleRepeat()" id="repeat-btn" class="text-zinc-400 hover:text-white w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-redo"></i>
                </button>
            </div>
            
            <!-- 进度条 -->
            <div class="flex items-center gap-x-3 w-full px-2">
                <span id="current-time" class="text-[10px] tabular-nums w-9 text-right text-zinc-400">0:00</span>
                <div onclick="seekTo(event)" class="flex-1 relative group cursor-pointer">
                    <div class="h-1.5 bg-zinc-700 rounded-full">
                        <div id="progress-bar" class="h-1.5 bg-purple-500 rounded-full progress-bar w-0 relative">
                            <div class="absolute -right-1.5 -top-1 w-4 h-4 bg-white rounded-full shadow opacity-0 group-hover:opacity-100 transition-all"></div>
                        </div>
                    </div>
                </div>
                <span id="total-time" class="text-[10px] tabular-nums w-9 text-zinc-400">0:00</span>
            </div>
        </div>

        <!-- 音量 -->
        <div class="w-1/3 flex justify-end items-center gap-x-3">
            <i class="fa-solid fa-volume-down text-zinc-400"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="75" 
                   class="w-24 accent-purple-500" oninput="setVolume(this.value)">
        </div>
    </div>

    <!-- 添加歌曲弹窗 -->
    <div id="add-modal" onclick="if (event.target.id === 'add-modal') hideAddModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-md rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h3 class="text-2xl font-bold">添加新歌曲</h3>
                <button onclick="hideAddModal()" class="text-2xl text-zinc-400 hover:text-white">×</button>
            </div>
            
            <form id="add-form" onsubmit="addNewSong(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">歌曲标题</label>
                        <input type="text" id="song-title" required class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">艺术家</label>
                        <input type="text" id="song-artist" required class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">MP3 直链</label>
                        <input type="url" id="song-url" required placeholder="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">封面链接（可选）</label>
                        <input type="url" id="song-cover" placeholder="https://picsum.photos/id/1015/300/300" class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="hideAddModal()" class="flex-1 py-3 rounded-2xl border border-zinc-700">取消</button>
                    <button type="submit" class="flex-1 py-3 bg-purple-600 hover:bg-purple-700 rounded-2xl font-semibold">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== 数据与状态 ====================
        let songs = [];
        let favorites = [];
        let playlists = [];
        let currentSong = null;
        let isPlaying = false;
        let audio = new Audio();
        let shuffleMode = false;
        let repeatMode = 0; // 0=关, 1=单曲, 2=全部
        let currentView = 'all';
        let currentPlaylistId = null;

        const defaultSongs = [
            { id: 1, title: "星空回响", artist: "银河使者", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://picsum.photos/id/1015/300/300" },
            { id: 2, title: "夜色迷航", artist: "月影乐队", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://picsum.photos/id/102/300/300" },
            { id: 3, title: "未来之声", artist: "电子幽灵", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://picsum.photos/id/1033/300/300" },
            { id: 4, title: "雨中旋律", artist: "寂静风暴", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", cover: "https://picsum.photos/id/1040/300/300" },
            { id: 5, title: "都市脉动", artist: "霓虹骑士", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", cover: "https://picsum.photos/id/106/300/300" },
            { id: 6, title: "梦境旅人", artist: "幻影交响", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", cover: "https://picsum.photos/id/1074/300/300" }
        ];

        function init() {
            // 加载本地数据
            songs = JSON.parse(localStorage.getItem('musiclib_songs')) || [...defaultSongs];
            favorites = JSON.parse(localStorage.getItem('musiclib_favorites')) || [];
            playlists = JSON.parse(localStorage.getItem('musiclib_playlists')) || [];

            renderSongs();
            updateSongCount();
            renderPlaylists();
            initAudio();
            
            // 默认音量
            document.getElementById('volume-slider').value = 75;
            audio.volume = 0.75;
            
            // 搜索框回车清空
            document.getElementById('search-input').addEventListener('keyup', function(e) {
                if (e.key === "Escape") this.value = "";
            });
        }

        function saveData() {
            localStorage.setItem('musiclib_songs', JSON.stringify(songs));
            localStorage.setItem('musiclib_favorites', JSON.stringify(favorites));
            localStorage.setItem('musiclib_playlists', JSON.stringify(playlists));
        }

        function updateSongCount() {
            document.getElementById('song-count').innerText = songs.length;
        }

        // ==================== 渲染歌曲 ====================
        function renderSongs(filtered = null) {
            const grid = document.getElementById('song-grid');
            grid.innerHTML = '';
            
            let toShow = filtered || songs;
            
            if (currentView === 'favorites') {
                toShow = songs.filter(s => favorites.includes(s.id));
            } else if (currentView === 'playlist' && currentPlaylistId) {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                if (pl) toShow = songs.filter(s => pl.songIds.includes(s.id));
            }
            
            if (toShow.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center"><i class="fa-solid fa-music text-6xl text-zinc-700 mb-4"></i><p class="text-zinc-400">这里空空如也</p></div>`;
                return;
            }
            
            toShow.forEach(song => {
                const isFav = favorites.includes(song.id);
                const card = document.createElement('div');
                card.className = `music-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer group`;
                card.innerHTML = `
                    <div class="relative">
                        <img src="${song.cover}" class="w-full aspect-square object-cover" alt="">
                        <div class="absolute top-3 right-3">
                            <button onclick="event.stopImmediatePropagation(); toggleFavorite(${song.id}, this)" class="w-8 h-8 flex items-center justify-center bg-black/60 backdrop-blur-md rounded-full">
                                <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart text-red-400"></i>
                            </button>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-b from-black/20 to-black/70 opacity-0 group-hover:opacity-100 flex items-end p-4 transition-all">
                            <button onclick="event.stopImmediatePropagation(); playSong(${song.id})" 
                                    class="ml-auto w-11 h-11 bg-purple-600 hover:bg-purple-500 rounded-full flex items-center justify-center shadow-2xl">
                                <i class="fa-solid fa-play ml-0.5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="font-semibold truncate">${song.title}</div>
                        <div class="text-sm text-zinc-400 truncate">${song.artist}</div>
                    </div>
                `;
                card.onclick = () => playSong(song.id);
                grid.appendChild(card);
            });
        }

        function filterSongs() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            if (!keyword) {
                renderSongs();
                return;
            }
            const filtered = songs.filter(s => 
                s.title.toLowerCase().includes(keyword) || s.artist.toLowerCase().includes(keyword)
            );
            renderSongs(filtered);
        }

        // ==================== 播放逻辑 ====================
        function playSong(songId) {
            const song = songs.find(s => s.id === songId);
            if (!song) return;
            
            currentSong = song;
            audio.src = song.url;
            
            audio.play().then(() => {
                isPlaying = true;
                updatePlayerUI();
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }).catch(() => alert('播放失败，请检查 MP3 链接是否有效'));
        }

        function updatePlayerUI() {
            if (!currentSong) return;
            document.getElementById('player-cover').src = currentSong.cover;
            document.getElementById('player-title').innerText = currentSong.title;
            document.getElementById('player-artist').innerText = currentSong.artist;
        }

        function togglePlay() {
            if (!currentSong) {
                if (songs.length > 0) playSong(songs[0].id);
                return;
            }
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('play-icon').classList.remove('fa-pause');
                document.getElementById('play-icon').classList.add('fa-play');
            } else {
                audio.play();
                isPlaying = true;
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }
        }

        function nextSong() {
            if (!currentSong || songs.length === 0) return;
            
            let nextIndex;
            const currentIndex = songs.findIndex(s => s.id === currentSong.id);
            
            if (shuffleMode) {
                nextIndex = Math.floor(Math.random() * songs.length);
            } else {
                nextIndex = (currentIndex + 1) % songs.length;
            }
            
            playSong(songs[nextIndex].id);
        }

        function prevSong() {
            if (!currentSong || songs.length === 0) return;
            const currentIndex = songs.findIndex(s => s.id === currentSong.id);
            const prevIndex = (currentIndex - 1 + songs.length) % songs.length;
            playSong(songs[prevIndex].id);
        }

        function toggleShuffle() {
            shuffleMode = !shuffleMode;
            const btn = document.getElementById('shuffle-btn');
            if (shuffleMode) {
                btn.classList.add('text-purple-400');
            } else {
                btn.classList.remove('text-purple-400');
            }
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            const btn = document.getElementById('repeat-btn');
            btn.innerHTML = repeatMode === 0 ? '<i class="fa-solid fa-redo"></i>' : 
                            repeatMode === 1 ? '<i class="fa-solid fa-redo fa-fw"></i>' : 
                            '<i class="fa-solid fa-redo fa-fw text-purple-400"></i>';
        }

        function seekTo(e) {
            if (!currentSong || !audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function setVolume(val) {
            audio.volume = val / 100;
        }

        function initAudio() {
            audio.addEventListener('timeupdate', () => {
                if (!audio.duration) return;
                const percent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress-bar').style.width = percent + '%';
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-time').innerText = formatTime(audio.duration);
            });

            audio.addEventListener('ended', () => {
                if (repeatMode === 1) {
                    audio.currentTime = 0;
                    audio.play();
                } else if (repeatMode === 2) {
                    nextSong();
                } else {
                    nextSong();
                }
            });

            // 键盘控制
            document.addEventListener('keydown', e => {
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
                if (e.code === 'ArrowRight') nextSong();
                if (e.code === 'ArrowLeft') prevSong();
            });
        }

        function formatTime(seconds) {
            if (!seconds) return '0:00';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        // ==================== 收藏功能 ====================
        function toggleFavorite(songId, element) {
            event.stopImmediatePropagation();
            
            if (favorites.includes(songId)) {
                favorites = favorites.filter(id => id !== songId);
                element.innerHTML = `<i class="fa-regular fa-heart text-red-400"></i>`;
            } else {
                favorites.push(songId);
                element.innerHTML = `<i class="fa-solid fa-heart text-red-400"></i>`;
            }
            saveData();
        }

        function showFavorites() {
            currentView = 'favorites';
            document.getElementById('page-title').innerText = '我喜欢的';
            document.getElementById('nav-all').classList.remove('nav-active');
            document.getElementById('nav-fav').classList.add('nav-active');
            renderSongs();
        }

        function showAllSongs() {
            currentView = 'all';
            currentPlaylistId = null;
            document.getElementById('page-title').innerText = '全部歌曲';
            document.getElementById('nav-all').classList.add('nav-active');
            document.getElementById('nav-fav').classList.remove('nav-active');
            renderSongs();
        }

        // ==================== 播放列表 ====================
        function createPlaylist() {
            const name = prompt('请输入播放列表名称：', '我的最爱');
            if (!name) return;
            
            const newPlaylist = {
                id: Date.now(),
                name: name,
                songIds: []
            };
            playlists.push(newPlaylist);
            saveData();
            renderPlaylists();
        }

        function renderPlaylists() {
            const container = document.getElementById('playlists-list');
            container.innerHTML = '';
            
            playlists.forEach(pl => {
                const div = document.createElement('div');
                div.className = `px-3 py-2 rounded-xl hover:bg-zinc-800 cursor-pointer flex items-center gap-x-2 text-sm ${currentPlaylistId === pl.id ? 'bg-zinc-800' : ''}`;
                div.innerHTML = `
                    <i class="fa-solid fa-list text-purple-400 w-4"></i>
                    <span class="flex-1 truncate">${pl.name}</span>
                    <span class="text-xs text-zinc-500">${pl.songIds.length}</span>
                `;
                div.onclick = () => loadPlaylist(pl.id);
                container.appendChild(div);
            });
        }

        function loadPlaylist(playlistId) {
            currentView = 'playlist';
            currentPlaylistId = playlistId;
            document.getElementById('page-title').innerText = playlists.find(p => p.id === playlistId).name;
            document.getElementById('nav-all').classList.remove('nav-active');
            document.getElementById('nav-fav').classList.remove('nav-active');
            renderSongs();
        }

        function addToPlaylist(songId, playlistId) {
            const pl = playlists.find(p => p.id === playlistId);
            if (!pl) return;
            if (!pl.songIds.includes(songId)) {
                pl.songIds.push(songId);
                saveData();
                alert('已添加到播放列表！');
            }
        }

        // ==================== 添加歌曲 ====================
        function showAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('add-modal').classList.add('flex');
        }
        
        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('flex');
            document.getElementById('add-modal').classList.add('hidden');
        }
        
        function addNewSong(e) {
            e.preventDefault();
            const title = document.getElementById('song-title').value;
            const artist = document.getElementById('song-artist').value;
            const url = document.getElementById('song-url').value;
            let cover = document.getElementById('song-cover').value || `https://picsum.photos/id/${Math.floor(Math.random()*1000)}/300/300`;
            
            const newSong = {
                id: Date.now(),
                title, artist, url, cover
            };
            
            songs.push(newSong);
            saveData();
            renderSongs();
            updateSongCount();
            hideAddModal();
            
            setTimeout(() => {
                playSong(newSong.id);
            }, 400);
        }

        function showNowPlaying() {
            if (!currentSong) return;
            alert(`正在播放：${currentSong.title}\n${currentSong.artist}`);
        }

        // 启动
        window.onload = init;
    </script>
