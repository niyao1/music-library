<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicLib • 音乐库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        。music-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        。music-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        。player-bar { background: linear-gradient(to right, #18181b, #27272a); }
        。progress-bar { transition: width 0.1s linear; }
        。song-row:hover { background-color: #27272a; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- 主容器 -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- 左侧边栏 -->
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <!-- Logo -->
            <div class="p-6 flex items-center gap-x-3">
                <div class="w-10 h-10 bg-purple-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-music text-3xl"></i>
                </div>
                <div>
                    <span class="font-bold text-3xl tracking-tighter">MusicLib</span>
                </div>
            </div>

            <!-- 导航 -->
            <div class="px-3">
                <div class="px-3 py-2 text-xs font-semibold text-zinc-500">菜单</div>
                <div onclick="showLibrary()" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 cursor-pointer mb-1">
                    <i class="fa-solid fa-home w-5 text-purple-400"></i>
                    <span class="font-medium">首页</span>
                </div>
                <div onclick="showLibrary()" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl bg-zinc-800 cursor-pointer mb-1">
                    <i class="fa-solid fa-list w-5 text-purple-400"></i>
                    <span class="font-medium">音乐库</span>
                </div>
                <div class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 cursor-pointer">
                    <i class="fa-solid fa-heart w-5 text-purple-400"></i>
                    <span class="font-medium">我喜欢的</span>
                </div>
            </div>

            <!-- 播放列表 -->
            <div class="px-3 mt-6 flex-1">
                <div class="flex items-center justify-between px-3 mb-2">
                    <div class="px-3 text-xs font-semibold text-zinc-500">播放列表</div>
                    <button onclick="addPlaylist()" class="text-purple-400 hover:text-purple-300">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div id="playlists-list" class="px-3 space-y-1 text-sm">
                    <!-- 动态添加 -->
                </div>
            </div>

            <!-- 添加歌曲按钮 -->
            <div class="p-4 border-t border-zinc-800 mt-auto">
                <button onclick="showAddModal()" 
                        class="w-full flex items-center justify-center gap-x-2 bg-purple-600 hover:bg-purple-700 transition-colors py-3 rounded-2xl font-semibold">
                    <i class="fa-solid fa-plus"></i>
                    <span>添加歌曲</span>
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col">
            
            <!-- 顶部搜索栏 -->
            <div class="h-16 border-b border-zinc-800 flex items-center px-8 bg-zinc-900/80 backdrop-blur-lg">
                <div class="flex-1 max-w-xl">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-4 top-3 text-zinc-400"></i>
                        <input id="search-input" type="text" placeholder="搜索歌曲或艺术家..." 
                               class="w-full bg-zinc-800 border border-zinc-700 pl-11 py-2.5 rounded-3xl text-sm focus:outline-none focus:border-purple-500"
                               oninput="filterSongs()">
                    </div>
                </div>
                <div class="flex items-center gap-x-4 ml-auto">
                    <div class="flex items-center gap-x-2">
                        <img src="https://picsum.photos/id/64/32/32" class="w-8 h-8 rounded-full ring-2 ring-purple-500" alt="用户">
                        <span class="font-medium text-sm">Karen</span>
                    </div>
                </div>
            </div>

            <!-- 内容区域 -->
            <div class="flex-1 p-8 overflow-auto">
                <div class="flex items-end justify-between mb-6">
                    <div>
                        <h1 class="text-4xl font-bold tracking-tighter">你的音乐库</h1>
                        <p class="text-zinc-400 mt-1">共 <span id="song-count">0</span> 首歌曲</p>
                    </div>
                    <button onclick="showAddModal()" 
                            class="flex items-center gap-x-2 px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">
                        <i class="fa-solid fa-upload"></i>
                        <span>上传新歌</span>
                    </button>
                </div>

                <!-- 歌曲网格 -->
                <div id="song-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-8 gap-4">
                    <!-- JS 动态渲染 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 底部播放器 -->
    <div class="fixed bottom-0 left-0 right-0 player-bar border-t border-zinc-700 h-20 px-6 flex items-center z-50">
        <div class="flex items-center gap-x-4 w-1/3">
            <!-- 当前播放信息 -->
            <div id="player-info" class="flex items-center gap-x-3 cursor-pointer" onclick="if(currentSong) showNowPlaying()">
                <img id="player-cover" src="https://picsum.photos/id/1015/56/56" class="w-14 h-14 rounded-xl object-cover shadow-lg" alt="">
                <div class="min-w-0">
                    <div id="player-title" class="font-semibold text-sm truncate">未播放</div>
                    <div id="player-artist" class="text-xs text-zinc-400 truncate">选择一首歌曲</div>
                </div>
            </div>
        </div>

        <!-- 播放控制 -->
        <div class="flex-1 flex flex-col items-center max-w-[420px]">
            <div class="flex items-center gap-x-5">
                <button onclick="prevSong()" class="text-zinc-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-step-backward text-xl"></i>
                </button>
                <button onclick="togglePlay()" id="play-btn"
                        class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform">
                    <i class="fa-solid fa-play ml-0.5" id="play-icon"></i>
                </button>
                <button onclick="nextSong()" class="text-zinc-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-step-forward text-xl"></i>
                </button>
            </div>
            
            <!-- 进度条 -->
            <div class="flex items-center gap-x-3 w-full mt-1 px-2">
                <span id="current-time" class="text-xs tabular-nums w-10 text-right text-zinc-400">0:00</span>
                <div class="flex-1 relative group">
                    <div onclick="seekTo(event)" class="h-1.5 bg-zinc-700 rounded-full cursor-pointer">
                        <div id="progress-bar" class="h-1.5 bg-purple-500 rounded-full progress-bar w-0 relative">
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                    </div>
                </div>
                <span id="total-time" class="text-xs tabular-nums w-10 text-zinc-400">0:00</span>
            </div>
        </div>

        <!-- 音量 -->
        <div class="w-1/3 flex justify-end items-center gap-x-3">
            <i class="fa-solid fa-volume-down text-zinc-400"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="80" 
                   class="w-24 accent-purple-500" oninput="setVolume(this.value)">
        </div>
    </div>

    <!-- 添加歌曲弹窗 -->
    <div id="add-modal" onclick="if (event.target.id === 'add-modal') hideAddModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-md rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">添加新歌曲</h3>
                <button onclick="hideAddModal()" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-times text-2xl"></i></button>
            </div>
            
            <form id="add-form" onsubmit="addNewSong(event)">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-1.5 text-zinc-400">歌曲标题</label>
                        <input type="text" id="song-title" required placeholder="例如：星空回响"
                               class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1.5 text-zinc-400">艺术家</label>
                        <input type="text" id="song-artist" required placeholder="例如：银河使者"
                               class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1.5 text-zinc-400">MP3 直链地址（必须是公开可访问的 .mp3 链接）</label>
                        <input type="url" id="song-url" required placeholder="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
                               class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm focus:outline-none focus:border-purple-500">
                        <p class="text-xs text-zinc-500 mt-1">推荐使用 freesound.org 或 soundhelix 的免费链接</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1.5 text-zinc-400">封面图片链接（可选）</label>
                        <input type="url" id="song-cover" placeholder="https://picsum.photos/id/1015/300/300"
                               class="w-full bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-2xl text-sm focus:outline-none focus:border-purple-500">
                    </div>
                </div>
                
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="hideAddModal()" 
                            class="flex-1 py-3 rounded-2xl border border-zinc-700 hover:bg-zinc-800 font-medium">取消</button>
                    <button type="submit" 
                            class="flex-1 py-3 bg-purple-600 hover:bg-purple-700 rounded-2xl font-semibold">添加歌曲</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Tailwind 配置
        function initTailwind() {
            document.documentElement.style.setProperty('--accent', '#a855f7');
        }

        // 数据
        let songs = [];
        let currentSong = null;
        let isPlaying = false;
        let audio = new Audio();
        let currentPlaylist = null;

        // 默认歌曲（免费 demo）
        const defaultSongs = [
            {
                id: 1,
                title: "星空回响",
                artist: "银河使者",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                cover: "https://picsum.photos/id/1015/300/300"
            },
            {
                id: 2,
                title: "夜色迷航",
                artist: "月影乐队",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                cover: "https://picsum.photos/id/102/300/300"
            },
            {
                id: 3,
                title: "未来之声",
                artist: "电子幽灵",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                cover: "https://picsum.photos/id/1033/300/300"
            },
            {
                id: 4,
                title: "雨中旋律",
                artist: "寂静风暴",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                cover: "https://picsum.photos/id/1040/300/300"
            },
            {
                id: 5,
                title: "都市脉动",
                artist: "霓虹骑士",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                cover: "https://picsum.photos/id/106/300/300"
            },
            {
                id: 6,
                title: "梦境旅人",
                artist: "幻影交响",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                cover: "https://picsum.photos/id/1074/300/300"
            }
        ];

        // 初始化
        function init() {
            initTailwind();
            
            // 加载本地数据
            const saved = localStorage.getItem('musiclib_songs');
            if (saved) {
                songs = JSON.parse(saved);
            } else {
                songs = [...defaultSongs];
                localStorage.setItem('musiclib_songs', JSON.stringify(songs));
            }
            
            renderSongs();
            updateSongCount();
            initAudioEvents();
            renderPlaylists();
            
            // 音量默认
            document.getElementById('volume-slider').value = 80;
            audio.volume = 0.8;
            
            // 欢迎提示
            setTimeout(() => {
                console.log('%c[MusicLib] 音乐库已就绪 - Grok 3 开发者模式', 'color:#a855f7');
            }, 500);
        }

        function saveSongs() {
            localStorage.setItem('musiclib_songs', JSON.stringify(songs));
        }

        function updateSongCount() {
            document.getElementById('song-count').innerText = songs.length;
        }

        // 渲染歌曲网格
        function renderSongs(filteredSongs = null) {
            const grid = document.getElementById('song-grid');
            grid.innerHTML = '';
            
            const toShow = filteredSongs || songs;
            
            if (toShow.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center">
                    <i class="fa-solid fa-music text-6xl text-zinc-700 mb-4"></i>
                    <p class="text-zinc-400">没有找到歌曲</p>
                </div>`;
                return;
            }
            
            toShow.forEach(song => {
                const card = document.createElement('div');
                card.className = `music-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer group`;
                card.innerHTML = `
                    <div class="relative">
                        <img src="${song.cover}" class="w-full aspect-square object-cover" alt="${song.title}">
                        <div class="absolute inset-0 bg-gradient-to-b from-black/30 to-black/70 opacity-0 group-hover:opacity-100 transition-all flex items-end p-4">
                            <button onclick="event.stopImmediatePropagation(); playSong(${song.id})" 
                                    class="ml-auto w-11 h-11 bg-purple-600 hover:bg-purple-500 rounded-full flex items-center justify-center shadow-xl">
                                <i class="fa-solid fa-play ml-0.5 text-white"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="font-semibold text-base truncate">${song.title}</div>
                        <div class="text-sm text-zinc-400 truncate">${song.artist}</div>
                    </div>
                `;
                
                card.onclick = () => playSong(song.id);
                grid.appendChild(card);
            });
        }

        // 搜索过滤
        function filterSongs() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            if (!keyword) {
                renderSongs();
                return;
            }
            
            const filtered = songs.filter(song => 
                song.title.toLowerCase().includes(keyword) || 
                song.artist.toLowerCase().includes(keyword)
            );
            renderSongs(filtered);
        }

        // 播放歌曲
        function playSong(songId) {
            const song = songs.find(s => s.id === songId);
            if (!song) return;
            
            currentSong = song;
            
            audio.src = song.url;
            audio.play().then(() => {
                isPlaying = true;
                updatePlayerUI();
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }).catch(err => {
                alert('播放失败！可能是链接无效或浏览器限制。\n请尝试其他歌曲或检查 MP3 直链是否正确。');
                console.error(err);
            });
        }

        function updatePlayerUI() {
            if (!currentSong) return;
            
            document.getElementById('player-cover').src = currentSong.cover;
            document.getElementById('player-title').innerText = currentSong.title;
            document.getElementById('player-artist').innerText = currentSong.artist;
            
            // 高亮当前播放
            document.querySelectorAll('.music-card').forEach(card => {
                card.classList.remove('ring-2', 'ring-purple-500');
                if (card.innerHTML.includes(currentSong.title)) {
                    card.classList.add('ring-2', 'ring-purple-500');
                }
            });
        }

        function togglePlay() {
            if (!currentSong) {
                // 没有播放就播放第一首
                if (songs.length > 0) playSong(songs[0].id);
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('play-icon').classList.remove('fa-pause');
                document.getElementById('play-icon').classList.add('fa-play');
            } else {
                audio.play();
                isPlaying = true;
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            }
        }

        function nextSong() {
            if (!currentSong || songs.length === 0) return;
            const idx = songs.findIndex(s => s.id === currentSong.id);
            const nextIdx = (idx + 1) % songs.length;
            playSong(songs[nextIdx].id);
        }

        function prevSong() {
            if (!currentSong || songs.length === 0) return;
            const idx = songs.findIndex(s => s.id === currentSong.id);
            const prevIdx = (idx - 1 + songs.length) % songs.length;
            playSong(songs[prevIdx].id);
        }

        function seekTo(e) {
            if (!currentSong || !audio.duration) return;
            const bar = e.currentTarget;
            const rect = bar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function setVolume(val) {
            audio.volume = val / 100;
        }

        function initAudioEvents() {
            audio.addEventListener('timeupdate', () => {
                if (!audio.duration) return;
                const percent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress-bar').style.width = percent + '%';
                
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-time').innerText = formatTime(audio.duration);
            });
            
            audio.addEventListener('ended', () => {
                nextSong();
            });
            
            audio.addEventListener('pause', () => {
                isPlaying = false;
                document.getElementById('play-icon').classList.remove('fa-pause');
                document.getElementById('play-icon').classList.add('fa-play');
            });
            
            audio.addEventListener('play', () => {
                isPlaying = true;
                document.getElementById('play-icon').classList.remove('fa-play');
                document.getElementById('play-icon').classList.add('fa-pause');
            });
            
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.code === 'ArrowRight') nextSong();
                if (e.code === 'ArrowLeft') prevSong();
            });
            
            // 进度条点击
            const progressContainer = document.querySelector('#progress-bar').parentElement;
            progressContainer.onclick = (e) => seekTo(e);
        }

        function formatTime(seconds) {
            if (!seconds) return '0:00';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        // 添加新歌
        function showAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('add-modal').classList.add('flex');
        }
        
        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('flex');
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('add-form').reset();
        }
        
        function addNewSong(e) {
            e.preventDefault();
            
            const title = document.getElementById('song-title').value.trim();
            const artist = document.getElementById('song-artist').value.trim();
            const url = document.getElementById('song-url').value.trim();
            let cover = document.getElementById('song-cover').value.trim();
            
            if (!cover) cover = `https://picsum.photos/id/${Math.floor(Math.random()*1000)}/300/300`;
            
            const newSong = {
                id: Date.now(),
                title,
                artist,
                url,
                cover
            };
            
            songs.push(newSong);
            saveSongs();
            renderSongs();
            updateSongCount();
            hideAddModal();
            
            // 自动播放新歌
            setTimeout(() => {
                playSong(newSong.id);
            }, 300);
        }

        // 播放列表（简单版）
        let playlists = [];
        
        function renderPlaylists() {
            const container = document.getElementById('playlists-list');
            container.innerHTML = '';
            
            if (playlists.length === 0) {
                container.innerHTML = `<div class="px-3 text-xs text-zinc-500">暂无播放列表</div>`;
                return;
            }
            
            playlists.forEach((pl, index) => {
                const div = document.createElement('div');
                div.className = `px-3 py-2 rounded-xl hover:bg-zinc-800 cursor-pointer flex items-center gap-x-2 text-sm`;
                div.innerHTML = `
                    <i class="fa-solid fa-list text-purple-400 w-4"></i>
                    <span class="flex-1 truncate">${pl.name}</span>
                    <span class="text-xs text-zinc-500">${pl.songs.length}</span>
                `;
                div.onclick = () => loadPlaylist(index);
                container.appendChild(div);
            });
        }
        
        function addPlaylist() {
            const name = prompt('输入播放列表名称：', '我的最爱');
            if (!name) return;
            
            playlists.push({ name, songs: [] });
            renderPlaylists();
        }
        
        function loadPlaylist(index) {
            // 简单实现：显示该列表里的歌
            alert('播放列表功能已就绪！\n（完整版可继续扩展，我可以立刻给你加完整代码）');
        }

        function showLibrary() {
            renderSongs();
            document.getElementById('search-input').value = '';
        }
        
        function showNowPlaying() {
            if (!currentSong) return;
            alert(`正在播放：${currentSong.title} - ${currentSong.artist}\n\n（这里可以扩展成完整歌词页或详情页）`);
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
